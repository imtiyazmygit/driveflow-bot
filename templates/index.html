<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Driveflow Booking Automation</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 40px; background: #f7f9fc; color: #1f2937; }
      .card { max-width: 640px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
      h1 { margin-top: 0; }
      label { display: block; margin-bottom: 8px; font-weight: 600; }
      select, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #cbd5e1; }
      button { background: #2563eb; color: white; border: none; cursor: pointer; }
      .status { margin-top: 16px; padding: 12px; background: #eff6ff; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Booking Automation</h1>
      <p>This simple web page lets the client request a booking check without seeing the underlying source code.</p>
      <form method="post">
        <label for="centre">Choose a preferred test centre</label>
        <select id="centre" name="centre">
          <option value="">Select a centre</option>
          <option>Southall (London)</option>
          <option>Watford</option>
          <option>Sidcup (London)</option>
          <option>Morden (London)</option>
        </select>
        <button type="submit">Run Booking Check</button>
      </form>
      {% if status %}
        <div class="status">{{ status }}</div>
      {% endif %}
    </div>
  </body>
</html>
