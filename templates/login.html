<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Client Login</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 40px; background: #f7f9fc; color: #1f2937; }
      .card { max-width: 420px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
      input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #cbd5e1; }
      button { background: #2563eb; color: white; border: none; cursor: pointer; }
      .error { color: #b91c1c; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Client Access</h2>
      <p>Please sign in to request a booking workflow.</p>
      <form method="post">
        <input name="username" placeholder="Username" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </div>
  </body>
</html>
